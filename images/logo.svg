<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="98" fill="white" stroke="#c8c8c8" stroke-width="1"/>

  <!-- Left side of house (solid) -->
  <g>
    <!-- Roof left -->
    <polygon points="100,35 40,80 100,80" fill="#1a3c2a"/>
    <!-- Wall left -->
    <rect x="48" y="80" width="52" height="60" fill="#1a3c2a"/>
    <!-- Window -->
    <rect x="58" y="92" width="18" height="18" fill="#f7f5f2" rx="1"/>
    <line x1="67" y1="92" x2="67" y2="110" stroke="#1a3c2a" stroke-width="2"/>
    <line x1="58" y1="101" x2="76" y2="101" stroke="#1a3c2a" stroke-width="2"/>
    <!-- Door -->
    <rect x="82" y="110" width="16" height="30" fill="#f7f5f2" rx="1"/>
    <circle cx="95" cy="126" r="1.5" fill="#1a3c2a"/>
  </g>

  <!-- Right side of house (framing/structure) -->
  <g stroke="#1a3c2a" stroke-width="2.5" fill="none">
    <!-- Roof right outline -->
    <polygon points="100,35 160,80 100,80"/>
    <!-- Roof framing lines -->
    <line x1="100" y1="35" x2="115" y2="80"/>
    <line x1="100" y1="35" x2="130" y2="80"/>
    <line x1="100" y1="35" x2="145" y2="80"/>
    <!-- Horizontal roof beam -->
    <line x1="104" y1="60" x2="150" y2="60"/>

    <!-- Wall right outline -->
    <rect x="100" y="80" width="52" height="60"/>
    <!-- Wall framing -->
    <line x1="126" y1="80" x2="126" y2="140"/>
    <line x1="100" y1="100" x2="152" y2="100"/>
    <line x1="100" y1="120" x2="152" y2="120"/>
    <!-- Cross bracing -->
    <line x1="100" y1="80" x2="126" y2="100"/>
    <line x1="126" y1="80" x2="152" y2="100"/>
  </g>

  <!-- Text -->
  <text x="100" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a3c2a">Second Home</text>
  <text x="100" y="184" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a3c2a">Opinion</text>
</svg>